name: DailyFlow
options:
  bundleIdPrefix: com.dailyflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

targets:
  DailyFlow:
    type: application
    platform: iOS
    sources:
      - DailyFlow
    resources:
      - DailyFlow/Assets.xcassets
      - path: DailyFlow/GoogleService-Info.plist
        optional: true
      - path: DailyFlow/Supabase.plist
        optional: true
    info:
      path: DailyFlow/Info.plist
      properties:
        CFBundleDisplayName: DailyFlow
        UILaunchScreen:
          UIColorName: BackgroundColor
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dailyflow.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
