workflows:
  ios-workflow:
    name: DailyFlow iOS Build
    max_build_duration: 60

    environment:
      groups:
        - ios-vars
      vars:
        XCODE_PROJECT: "DailyFlow.xcodeproj"
        XCODE_SCHEME: "DailyFlow"
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen || true

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          xcodegen generate

      - name: Add GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist
            echo "GoogleService-Info.plist created from Codemagic variable"
          else
            echo "Using GoogleService-Info.plist from repo if available"
          fi
          ls -la $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist || true

      - name: Add Supabase.plist
        script: |
          if [ -n "$SUPABASE_PLIST" ]; then
            echo "$SUPABASE_PLIST" > $CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist
            echo "Supabase.plist created from Codemagic variable"
          else
            echo "Using Supabase.plist from repo"
          fi
          ls -la $CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist || true

      - name: Build iOS app no signing
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

    artifacts:
      - DailyFlow/build/**/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - parvgarg.sn@gmail.com
        notify:
          success: true
          failure: true
