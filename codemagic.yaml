workflows:
  ios-workflow:
    name: DailyFlow iOS Build
    max_build_duration: 60
    environment:
      groups:
        - ios-vars
      vars:
        XCODE_PROJECT: "DailyFlow.xcodeproj"
        XCODE_SCHEME: "DailyFlow"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen || true

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          xcodegen generate

      - name: Add GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf "%s" "$GOOGLE_SERVICE_INFO_PLIST" > $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist
            echo "GoogleService-Info.plist created"
          else
            echo "Using GoogleService-Info.plist from repo"
          fi
          ls -la $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist || true
          plutil -lint $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist || true

      - name: Check Supabase.plist
        script: |
          echo "Checking Supabase.plist from repo..."
          if [ -f "$CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist" ]; then
            echo "Supabase.plist found"
            ls -la $CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist
            echo "Validating plist..."
            plutil -lint $CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist
          else
            echo "ERROR: Supabase.plist not found!"
            exit 1
          fi

      - name: Build iOS app no signing
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

      - name: Package IPA
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          APP_PATH=$(find build -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r DailyFlow.ipa Payload/
          rm -rf Payload

    artifacts:
      - DailyFlow/DailyFlow.ipa
      - DailyFlow/build/**/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - parvgarg.sn@gmail.com
        notify:
          success: true
          failure: true
