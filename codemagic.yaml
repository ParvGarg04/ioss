workflows:
  ios-workflow:
    name: DailyFlow iOS Build
    max_build_duration: 60

    environment:
      groups:
        - ios-vars
      vars:
        XCODE_PROJECT: "DailyFlow.xcodeproj"
        XCODE_SCHEME: "DailyFlow"
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen || true

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          xcodegen generate

      - name: Add GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf "%s" "$GOOGLE_SERVICE_INFO_PLIST" > $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist
          fi
          plutil -lint $CM_BUILD_DIR/DailyFlow/DailyFlow/GoogleService-Info.plist

      - name: Check Supabase.plist
        script: |
          echo "Checking Supabase.plist from repo..."
          ls -la $CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist
          plutil -lint $CM_BUILD_DIR/DailyFlow/DailyFlow/Supabase.plist

      - name: Build iOS app no signing
        script: |
          cd $CM_BUILD_DIR/DailyFlow
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

    artifacts:
      - DailyFlow/build/**/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - parvgarg.sn@gmail.com
        notify:
          success: true
          failure: true
